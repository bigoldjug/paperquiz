<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quiz JSON</title>
</head>
<body>

<h2>Quiz JSON</h2>

<!-- ===================== -->
<!-- SOURCE LIST (URL) -->
<!-- ===================== -->
<h3>📚 Liste de quiz disponibles</h3>

<select id="jsonList" onchange="loadFromList()">
    <option value="">-- Choisir un quiz --</option>
    <option value="https://bigoldjug.github.io/paperquiz/texte7.json">Texte n°7 : On ne badine pas avec l'amour 1</option>
</select>

<br><br>

<!-- ===================== -->
<!-- FILE IMPORT -->
<!-- ===================== -->
<div style="display:none;">
<h3>📁 Import fichier JSON</h3>
<input type="file" id="fileInput" accept=".json">
<button onclick="loadFromFile()">Importer fichier</button>
</div>
<hr>

<!-- ===================== -->
<!-- MANUAL INPUT -->
<!-- ===================== -->
  <div style="display:none;">
<h3>✍️ JSON manuel</h3>

<textarea id="jsonInput" rows="15" cols="100">
{
  "text": "Le coeur pompe le sang et les poumons assurent les échanges gazeux.",
  "elements": [
    {
      "label": "coeur",
      "questions": [
        "Quel est son rôle ?",
        "Combien de cavités possède-t-il ?"
      ]
    },
    {
      "label": "poumons",
      "questions": [
        "Quelle est leur fonction principale ?"
      ]
    }
  ]
}
</textarea>
  </div>
<br><br>

<button onclick="loadFromTextarea()">Charger JSON manuel</button>

<hr>

<div id="quizText"></div>
<hr>
<div id="questionsContainer"></div>

<br>
<button onclick="exportTXT()">Export TXT</button>

<script>

let quizData = null;

function escapeRegExp(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

/* =========================
   CORE RENDER
========================= */
function renderQuiz() {

    let text = quizData.text;

    quizData.elements.forEach((element, index) => {

        const regex = new RegExp(escapeRegExp(element.label), "g");

        text = text.replace(
            regex,
            `<a href="#" onclick="openQuestions(${index});return false;">${element.label}</a>`
        );
    });

    document.getElementById("quizText").innerHTML =
        text.replace(/\n/g, "<br>");

    document.getElementById("questionsContainer").innerHTML = "";
}

/* =========================
   LOAD FROM TEXTAREA
========================= */
function loadFromTextarea() {
    try {
        quizData = JSON.parse(document.getElementById("jsonInput").value);
        renderQuiz();
    } catch (e) {
        alert("JSON invalide");
    }
}

/* =========================
   LOAD FROM FILE
========================= */
function loadFromFile() {

    const file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("Choisis un fichier JSON");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(event) {
        try {
            quizData = JSON.parse(event.target.result);
            renderQuiz();
        } catch (e) {
            alert("Fichier JSON invalide");
        }
    };

    reader.readAsText(file);
}

/* =========================
   LOAD FROM URL LIST
========================= */
async function loadFromList() {

    const url = document.getElementById("jsonList").value;

    if (!url) return;

    try {
        const res = await fetch(url);
        quizData = await res.json();
        renderQuiz();
    } catch (e) {
        alert("Erreur chargement URL");
    }
}

/* =========================
   QUESTIONS
========================= */
function openQuestions(index) {

    const element = quizData.elements[index];

    let html = `<fieldset><legend>${element.label}</legend>`;

    element.questions.forEach((q, qIndex) => {

        const id = `e${index}_q${qIndex}`;

        html += `
            <p>${q}</p>
            <input type="text" id="${id}" style="width:300px">
        `;
    });

    html += `</fieldset>`;

    document.getElementById("questionsContainer").innerHTML += html;
}

/* =========================
   EXPORT
========================= */
function exportTXT() {

    let output = "";

    quizData.elements.forEach((element, eIndex) => {

        output += element.label + "\n";

        element.questions.forEach((q, qIndex) => {

            const id = `e${eIndex}_q${qIndex}`;
            const value = document.getElementById(id)?.value || "";

            output += q + "\n";
            output += value + "\n";
        });

        output += "\n";
    });

    const blob = new Blob([output], { type: "text/plain" });

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "quiz.txt";
    a.click();

    URL.revokeObjectURL(url);
}

</script>

</body>
</html>
